<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Playlist DJ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>AI Playlist DJ</h1>
      <p class="subtitle">Build intelligent playlists by mood and flow</p>
    </header>
    <nav class="tabs">
      <button id="tabSession" class="active">Session</button>
      <button id="tabDemo">Demo</button>
    </nav>
    <main class="main">
      <section class="panel">
        <h2>Spotify & Data</h2>
        <div class="actions">
          <button id="loginSpotify" data-session-only>Login with Spotify</button>
          <button id="fetchLibrary" data-session-only>Fetch Saved Tracks</button>
          <button id="searchTracks" data-session-only>Search Tracks</button>
          <button id="saveDB" data-session-only>Save to DB</button>
          <button id="loadDB" data-session-only>Load from DB</button>
        </div>
        <div class="actions" style="margin-top:8px">
          <input id="playlistName" data-session-only placeholder="Playlist name" value="AI DJ Session" style="flex:1;max-width:280px;padding:8px;border-radius:8px;border:1px solid #1b2430;background:#0c1117;color:#e6eaf0">
          <button id="exportSpotify" data-session-only>Export to Spotify Playlist</button>
        </div>
        <div id="authStatus" class="summary"></div>
      </section>
      <section class="panel">
        <h2>Targets</h2>
        <div class="sliders">
          <div class="slider">
            <label for="energy">Energy <span id="energyVal">0.6</span></label>
            <input id="energy" type="range" min="0" max="1" step="0.01" value="0.6">
          </div>
          <div class="slider">
            <label for="tempo">Tempo BPM <span id="tempoVal">120</span></label>
            <input id="tempo" type="range" min="60" max="180" step="1" value="120">
          </div>
          <div class="slider">
            <label for="tempoBias">Tempo Bias <span id="tempoBiasVal">1.0</span></label>
            <input id="tempoBias" type="range" min="0" max="2" step="0.05" value="1.0">
          </div>
          <div class="slider">
            <label for="valence">Valence <span id="valenceVal">0.5</span></label>
            <input id="valence" type="range" min="0" max="1" step="0.01" value="0.5">
          </div>
          <div class="slider">
            <label for="danceability">Danceability <span id="danceabilityVal">0.6</span></label>
            <input id="danceability" type="range" min="0" max="1" step="0.01" value="0.6">
          </div>
          <div class="slider">
            <label for="acousticness">Acousticness <span id="acousticnessVal">0.3</span></label>
            <input id="acousticness" type="range" min="0" max="1" step="0.01" value="0.3">
          </div>
          <div class="slider">
            <label for="instrumentalness">Instrumentalness <span id="instrumentalnessVal">0.2</span></label>
            <input id="instrumentalness" type="range" min="0" max="1" step="0.01" value="0.2">
          </div>
          <div class="slider">
            <label for="genreWeight">Genre Weight <span id="genreWeightVal">0.30</span></label>
            <input id="genreWeight" type="range" min="0" max="1" step="0.05" value="0.3">
          </div>
          <div class="slider">
            <label for="length">Playlist Length <span id="lengthVal">20</span></label>
            <input id="length" type="range" min="5" max="30" step="1" value="20">
          </div>
        </div>
        <h3>Genres</h3>
        <div id="genres" class="genres"></div>
        <div class="actions">
          <button id="loadDemo" data-demo-only>Load Demo Data</button>
          <button id="build">Build Playlist</button>
        </div>
      </section>
      <section class="panel">
        <h2>Visualization</h2>
        <canvas id="viz" width="900" height="280"></canvas>
        <div id="summary" class="summary"></div>
      </section>
      <section class="panel">
        <h2>Playlist</h2>
        <ol id="playlist" class="playlist"></ol>
      </section>
    </main>
    <footer class="footer">
      <span>Local demo uses synthetic audio features</span>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
